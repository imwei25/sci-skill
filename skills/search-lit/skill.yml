schema_version: 2
name: search-lit
layer: A
owner_domain: literature_discovery
maturity: official
when_to_use:
  - User asks to find papers, related work, citations, or background literature on a topic
  - Generating a verified candidate citation pool (Europe PMC / PubMed / Semantic Scholar)
  - Building a BibTeX library for a topic without yet committing to inclusion
when_NOT_to_use:
  - Verifying citations already in a manuscript (use the reference-check skill)
  - Generating references from model memory (forbidden — every entry must be API-verified)
inputs:
  - literature_query
outputs:
  - outputs/refs.bib  # search-result candidate pool
  - outputs/search_results.tsv
deterministic_scripts:
  - references/pubmed_eutils.sh  # NCBI E-utilities + Europe PMC (epmc_* commands, China-reachable)
  - references/parse_pubmed.py
  - references/snowball.py  # citation snowballing via Semantic Scholar Graph API
side_effects:
  - may_call_external_literature_apis
downstream_consumers:
  - reference-check  # verifies the candidate pool against Crossref / Europe PMC
  - literature-review  # synthesizes an evidence table + review from candidates
forbidden_actions:
  - generate_references_from_memory
  - silently_include_unverified_references

# v2.1 quality card
purpose: "Search PubMed, Semantic Scholar, and bioRxiv/medRxiv and generate API-verified BibTeX (anti-hallucination: every reference verified before inclusion)."
safety_boundaries:
  - "Never generates references from memory; unverified references are not silently included."
known_limitations:
  - "NCBI E-utilities is often blocked from mainland China; use the Europe PMC (epmc_*) path there."
  - "Verification confirms existence/metadata, not topical relevance."
validation_commands:
  - "bash references/pubmed_eutils.sh epmc_search <query>  # Europe PMC, China-reachable"
  - "python references/parse_pubmed.py --help"
evidence_surface: bundled_script
